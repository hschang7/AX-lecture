<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커뮤니티 · 홍성 AX</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- ── 상단 네비게이션 ── -->
  <header class="site-header">
    <nav class="container nav-inner">
      <a href="index.html" class="logo">홍성 · AX</a>
      <button class="hamburger" id="hamburger" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="index.html">홈</a></li>
        <li><a href="about.html">소개</a></li>
        <li><a href="lectures.html">강연</a></li>
        <li><a href="insights.html">인사이트</a></li>
        <li><a href="community.html" class="active">커뮤니티</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <!-- ── 상단 헤더 ── -->
    <section class="comm-header">
      <div class="container">
        <span class="comm-page-label">community</span>
        <h1 class="comm-page-title">나눔터</h1>
        <p class="comm-page-sub">
          자기소개, 프롬프트, AI 활용팁, 새로 알게 된 정보를 함께 나누는 공간입니다.<br>
          글은 누구나 읽을 수 있고, Google 로그인 후에 직접 남길 수 있습니다.
        </p>
      </div>
    </section>

    <!-- ── 본문 ── -->
    <section class="comm-body">
      <div class="container">

        <!-- 로그인 상태 영역 -->
        <div id="auth-section" class="comm-auth-section">

          <!-- 로그아웃 상태 (기본 표시) -->
          <div id="logged-out" class="comm-logged-out">
            <p class="comm-auth-guide">글을 남기고 싶다면 Google 계정으로 로그인해 주세요.</p>
            <button id="google-login-btn" class="comm-google-btn">
              <svg width="16" height="16" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
                <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
                <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
                <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
              </svg>
              Google로 로그인
            </button>
          </div>

          <!-- 로그인 상태 (기본 숨김) -->
          <div id="logged-in" class="comm-logged-in" style="display:none;">
            <img id="user-avatar" class="comm-avatar" src="" alt="프로필">
            <span id="user-name" class="comm-user-name"></span>
            <button id="logout-btn" class="comm-logout-btn">로그아웃</button>
          </div>

        </div>

        <!-- 글쓰기 버튼 (로그인 시에만 보임, 기본 숨김) -->
        <div id="write-collapsed" class="comm-write-collapsed" style="display:none;">
          <button id="open-write-form-btn" class="comm-open-write-btn">+ 나눔 글쓰기</button>
        </div>

        <!-- 글쓰기 폼 (기본 숨김) -->
        <div id="write-form" class="comm-write-form" style="display:none;">

          <!-- 폼 헤더 -->
          <div class="comm-form-header">
            <span class="comm-form-label">새 글 쓰기</span>
            <button id="close-write-form-btn" class="comm-form-close">× 닫기</button>
          </div>

          <!-- 카테고리 선택 -->
          <div class="comm-category-pills" role="group" aria-label="카테고리">
            <label class="comm-cat-label">
              <input type="radio" name="category" value="intro" class="sr-only" checked>
              <span>자기소개</span>
            </label>
            <label class="comm-cat-label">
              <input type="radio" name="category" value="prompt" class="sr-only">
              <span>프롬프트</span>
            </label>
            <label class="comm-cat-label">
              <input type="radio" name="category" value="tip" class="sr-only">
              <span>AI 활용팁</span>
            </label>
            <label class="comm-cat-label">
              <input type="radio" name="category" value="info" class="sr-only">
              <span>알게 된 정보</span>
            </label>
          </div>

          <!-- 제목 -->
          <input
            type="text"
            id="post-title"
            class="comm-input"
            placeholder="제목 (80자 이내)"
            maxlength="80"
          >

          <!-- 본문 -->
          <textarea
            id="post-content"
            class="comm-textarea"
            rows="8"
            placeholder="내용을 자유롭게 써주세요. 프롬프트를 공유하신다면 어떤 결과가 나왔는지도 함께 적어주시면 좋아요."
          ></textarea>

          <!-- 액션 버튼 -->
          <div class="comm-form-actions">
            <button id="cancel-write-btn" class="comm-cancel-btn">취소</button>
            <button id="submit-post-btn" class="comm-submit-btn">올리기</button>
          </div>

        </div>

        <!-- 글 목록 섹션 -->
        <h2 class="comm-posts-heading">나눔 글</h2>

        <!-- 카테고리 필터 -->
        <div id="filter-bar" class="comm-filter-bar">
          <button class="comm-filter-btn active" data-filter="all">전체</button>
          <button class="comm-filter-btn" data-filter="intro">자기소개</button>
          <button class="comm-filter-btn" data-filter="prompt">프롬프트</button>
          <button class="comm-filter-btn" data-filter="tip">AI 활용팁</button>
          <button class="comm-filter-btn" data-filter="info">알게 된 정보</button>
        </div>

        <!-- 로딩 중 -->
        <div id="posts-loading" class="comm-posts-loading">글 목록을 불러오는 중...</div>

        <!-- 빈 상태 -->
        <div id="posts-empty" class="comm-posts-empty" style="display:none;">
          아직 나눠진 글이 없어요. 첫 번째 이야기를 남겨보세요.
        </div>

        <!-- 글 목록 -->
        <div id="posts-container"></div>

      </div>
    </section>

  </main>

  <!-- ── 푸터 ── -->
  <footer class="site-footer">
    <div class="container">
      <p class="footer-copy">© 2026 홍성. AX space.</p>
      <p class="footer-email">
        <a href="mailto:hschang69@gmail.com">hschang69@gmail.com</a>
      </p>
    </div>
  </footer>

  <script>
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('nav-menu');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      navMenu.classList.toggle('open');
    });
  </script>
  <script src="js/supabase-config.js"></script>
  <script src="js/community.js"></script>

</body>
</html>
