<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강연 일정 · 홍성 AX</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── 상단 네비게이션 ── -->
  <header class="site-header">
    <nav class="container nav-inner">
      <a href="index.html" class="logo">홍성 · AX</a>
      <button class="hamburger" id="hamburger" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="index.html">홈</a></li>
        <li><a href="about.html">소개</a></li>
        <li><a href="lectures.html" class="active">강연 일정</a></li>
        <li><a href="resources.html">자료실</a></li>
        <li><a href="community.html">커뮤니티</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <!-- ── 상단 헤더 섹션 ── -->
    <section class="lec-header">
      <div class="container">
        <span class="lec-page-label">lectures</span>
        <h1 class="lec-page-title">함께했던, 그리고 앞으로 이어질 이야기들</h1>
        <p class="lec-page-sub">
          기업 임원, 공공기관, 학교 등 다양한 자리에서 AX에 관한 이야기를 나누고 있습니다.
        </p>
      </div>
    </section>

    <!-- ── 다가오는 강연 섹션 ── -->
    <section class="lec-section">
      <div class="container">
        <h2 class="lec-section-heading">다가오는 강연</h2>
        <div id="upcoming-lectures"></div>
      </div>
    </section>

    <!-- ── 지난 강연 섹션 ── -->
    <section class="lec-section lec-section--past">
      <div class="container">
        <h2 class="lec-section-heading">지난 강연</h2>
        <div id="past-lectures"></div>
      </div>
    </section>

    <!-- ── 강연 요청 CTA ── -->
    <section class="lec-cta">
      <div class="container lec-cta-inner">
        <div>
          <h2 class="lec-cta-title">강연을 요청하고 싶으신가요?</h2>
          <p class="lec-cta-desc">기업, 기관, 학교의 AX 관련 강연 요청을 환영합니다.</p>
        </div>
        <a href="about.html#contact" class="btn btn-solid">섭외 문의하기</a>
      </div>
    </section>

  </main>

  <!-- ── 푸터 ── -->
  <footer class="site-footer">
    <div class="container">
      <p class="footer-copy">© 2026 홍성. AX lecture space.</p>
      <p class="footer-email">
        <a href="mailto:hschang69@gmail.com">hschang69@gmail.com</a>
      </p>
    </div>
  </footer>

  <script src="js/lectures.js"></script>
  <script>
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('nav-menu');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      navMenu.classList.toggle('open');
    });
  </script>

</body>
</html>
