<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커뮤니티 · 홍성 AX</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- ── 상단 네비게이션 ── -->
  <header class="site-header">
    <nav class="container nav-inner">
      <a href="index.html" class="logo">홍성 · AX</a>
      <button class="hamburger" id="hamburger" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="index.html">홈</a></li>
        <li><a href="about.html">소개</a></li>
        <li><a href="lectures.html">강연 일정</a></li>
        <li><a href="resources.html">자료실</a></li>
        <li><a href="community.html" class="active">커뮤니티</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <!-- ── 상단 헤더 ── -->
    <section class="comm-header">
      <div class="container">
        <span class="comm-page-label">community</span>
        <h1 class="comm-page-title">나눔터</h1>
        <p class="comm-page-sub">
          자기소개, 프롬프트, AI 활용팁, 새로 알게 된 정보를 함께 나누는 공간입니다.<br>
          글은 누구나 읽을 수 있고, Google 로그인 후에 직접 남길 수 있습니다.
        </p>
      </div>
    </section>

    <!-- ── 본문 ── -->
    <section class="comm-body">
      <div class="container">

        <!-- 로그인 상태 영역 -->
        <div id="auth-section" class="comm-auth-section">

          <!-- 로그아웃 상태 (기본 표시) -->
          <div id="logged-out" class="comm-logged-out">
            <p class="comm-auth-guide">글을 남기고 싶다면 Google 계정으로 로그인해 주세요.</p>
            <button id="google-login-btn" class="comm-google-btn">
              <!-- Google G 아이콘 -->
              <svg width="16" height="16" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
                <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
                <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
                <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
              </svg>
              Google로 로그인
            </button>
          </div>

          <!-- 로그인 상태 (기본 숨김) -->
          <div id="logged-in" class="comm-logged-in" style="display:none;">
            <img id="user-avatar" class="comm-avatar" src="" alt="프로필">
            <span id="user-name" class="comm-user-name"></span>
            <button id="logout-btn" class="comm-logout-btn">로그아웃</button>
          </div>

        </div>

        <!-- 게시글 영역 (다음 단계 플레이스홀더) -->
        <h2 class="comm-posts-heading">나눔 글</h2>
        <div class="comm-posts-placeholder">
          곧 이 공간에 수강생들의 생각과 팁들이 쌓일 예정입니다.
        </div>

      </div>
    </section>

  </main>

  <!-- ── 푸터 ── -->
  <footer class="site-footer">
    <div class="container">
      <p class="footer-copy">© 2026 홍성. AX lecture space.</p>
      <p class="footer-email">
        <a href="mailto:hschang69@gmail.com">hschang69@gmail.com</a>
      </p>
    </div>
  </footer>

  <script>
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('nav-menu');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      navMenu.classList.toggle('open');
    });
  </script>
  <script src="js/supabase-config.js"></script>
  <script src="js/community.js"></script>

</body>
</html>
